<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 230" role="img" aria-labelledby="logo-title" xml:lang="he" direction="rtl">
  <title id="logo-title">כפלול</title>
  <defs>
    <linearGradient id="logo-fill" x1="10%" y1="0%" x2="92%" y2="0%">
      <stop offset="0%" stop-color="#9cf421"/>
      <stop offset="20%" stop-color="#2adfff"/>
      <stop offset="43%" stop-color="#ef55ff"/>
      <stop offset="65%" stop-color="#7968ff"/>
      <stop offset="84%" stop-color="#21cfff"/>
      <stop offset="100%" stop-color="#ffd126"/>
    </linearGradient>
    <linearGradient id="leaf-fill" x1="10%" y1="95%" x2="90%" y2="5%">
      <stop offset="0%" stop-color="#43b915"/>
      <stop offset="55%" stop-color="#9af324"/>
      <stop offset="100%" stop-color="#eaff6a"/>
    </linearGradient>
    <filter id="outer-glow" x="-18%" y="-32%" width="136%" height="164%">
      <feDropShadow dx="0" dy="0" stdDeviation="7" flood-color="#7fc7ff" flood-opacity=".95"/>
      <feDropShadow dx="0" dy="12" stdDeviation="3" flood-color="#02165f" flood-opacity=".75"/>
      <feDropShadow dx="0" dy="22" stdDeviation="13" flood-color="#00091f" flood-opacity=".55"/>
    </filter>
