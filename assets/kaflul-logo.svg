      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#082d05" flood-opacity=".42"/>
    </filter>
  </defs>
  <g filter="url(#outer-glow)">
    <text
      x="380"
      y="142"
      text-anchor="middle"
      dominant-baseline="middle"
      unicode-bidi="plaintext"
      direction="rtl"
