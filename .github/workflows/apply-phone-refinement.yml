name: Apply phone refinement

on:
  push:
    branches:
      - mobile-ui-v1
    paths:
      - ".github/workflows/apply-phone-refinement.yml"
      - "tools/apply_phone_refinement.py"

permissions:
  contents: write

jobs:
  refine:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out mobile branch
        uses: actions/checkout@v4
        with:
          ref: mobile-ui-v1
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply phone camera refinement
        run: python tools/apply_phone_refinement.py

      - name: Validate JavaScript
        run: |
          node --check game.js
          git diff --check

      - name: Commit refined phone camera
        run: |
          if git diff --quiet; then
            echo "No camera changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js
          git commit -m "feat: enlarge the phone game view"
          git push origin HEAD:mobile-ui-v1
