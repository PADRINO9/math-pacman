name: Validate game runtime

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out current revision
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate JavaScript syntax
        run: |
          node --check game.js
          node --check poster-loader.js
          node --check mobile-enhancements.js
          node --check mobile-screen-state.js
          node --check mobile-question-state.js
          node --check mobile-native-answer.js
          node --check nabatick-directional.js
          node --check maze-enhancements.js
          node --check tests/game.spec.js
          node --check playwright.production.config.js

      - name: Run local desktop and mobile browser tests
        run: npm run test:smoke

      - name: Run production desktop and mobile browser tests
        run: npx playwright test tests/game.spec.js --config=playwright.production.config.js

      - name: Verify clean patch formatting
        run: git diff --check
