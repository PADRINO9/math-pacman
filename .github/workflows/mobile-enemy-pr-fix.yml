name: Mobile enemy PR fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply mobile enemy and scale fix
        run: python tools/apply_mobile_enemy_and_scale_fix.py

      - name: Validate fixed sources
        run: |
          node --check game.js
          node --check mobile-native-answer.js
          git diff --check
          grep -q 'mobileCharacterScale' game.js
          grep -q 'enemy.stuckTime' game.js
          grep -q 'const scatterWindow = !MOBILE_RUNTIME.coarse' game.js
          ! grep -q 'mobile-camera-fit-runtime.js' index.html

      - name: Commit and push to PR branch
        run: |
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js index.html
          git commit -m "fix: restore mobile enemy chasing and enlarge characters"
          git pull --rebase origin "${{ github.head_ref }}"
          git push origin "HEAD:${{ github.head_ref }}"
