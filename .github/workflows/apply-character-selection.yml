name: Apply and test character selection

on:
  push:
    branches:
      - character-selection-v1
    paths:
      - ".github/workflows/apply-character-selection.yml"
      - "tools/apply_character_selection.py"
      - "tools/character-assets/**"
      - "character-selector.css"
      - "tests/character-selection.mjs"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: character-selection-v1
          fetch-depth: 0

      - name: Decode and verify Nabatick animation sprites
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64
          import hashlib
          import struct

          sources = {
              "nabatick-idle.png": (
                  "".join(Path("tools/character-assets/nabatick-idle.png.b64").read_text().split()),
                  "eef95e15d7ea22dfe36e0c5363649a166c1ac453b1d1e8514a1330e088f15154",
              ),
              "nabatick-eat-prepare.png": (
                  "".join(Path("tools/character-assets/nabatick-eat-prepare.png.b64").read_text().split()),
                  "77c4c6f23bed5ea7cec512edf5b7855ff3541d95806e937fd95538692c56c317",
              ),
              "nabatick-eat.png": (
                  "".join(
                      path.read_text().strip()
                      for path in sorted(Path("tools/character-assets/eat-chunks").glob("*.txt"))
                  ),
                  "c67b531aba32da462bd3d602d969240746c904c6d85c4bb28e9e849d6f22710d",
              ),
          }

          assets_dir = Path("assets")
          assets_dir.mkdir(exist_ok=True)
          for output_name, (encoded, expected_sha256) in sources.items():
              data = base64.b64decode(encoded, validate=True)
              digest = hashlib.sha256(data).hexdigest()
              if digest != expected_sha256:
                  raise SystemExit(f"{output_name} hash mismatch: {digest}")
              if data[:8] != b"\x89PNG\r\n\x1a\n":
                  raise SystemExit(f"{output_name} is not a PNG")
              width, height = struct.unpack(">II", data[16:24])
              if (width, height) != (128, 128):
                  raise SystemExit(f"{output_name} has unexpected dimensions: {width}x{height}")
              (assets_dir / output_name).write_bytes(data)
              print(f"validated {output_name}: {width}x{height}, {len(data)} bytes")
          PY

      - name: Apply character-selection patch
        run: python3 tools/apply_character_selection.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate generated sources
        run: |
          node --check game.js
          git diff --check
          grep -q 'PLAYER_CHARACTERS' game.js
          grep -q 'name="character" value="bifly"' index.html
          grep -q 'name="character" value="nabatick"' index.html
          grep -q 'assets/nabatick-eat.png' game.js
          grep -q 'character-selector.css' index.html
          grep -q 'game.js?v=20260621-10' index.html

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.53.0 >/tmp/playwright-install.log 2>&1
          npx playwright install --with-deps chromium >>/tmp/playwright-install.log 2>&1

      - name: Run mobile browser test
        id: e2e
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/math-maze-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              break
            fi
            sleep 0.5
          done
          TEST_BASE_URL=http://127.0.0.1:4173 node tests/character-selection.mjs

      - name: Commit generated assets and integrated sources
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              assets/nabatick-idle.png \
              assets/nabatick-eat-prepare.png \
              assets/nabatick-eat.png \
              index.html \
              game.js
            git commit -m "feat: add selectable Nabatick character with animations"
            git pull --rebase origin character-selection-v1
            git push origin HEAD:character-selection-v1
          fi

      - name: Remove one-time build scaffolding
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf \
            .github/workflows/apply-character-selection.yml \
            tools/apply_character_selection.py \
            tools/character-assets \
            tests/character-selection.mjs \
            character-selection-notes.md \
            character-selection-notes-2.md \
            character-selection-notes-3.md \
            character-selection-ready.txt
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: remove character build scaffolding"
            git pull --rebase origin character-selection-v1
            git push origin HEAD:character-selection-v1
          fi
