name: Apply character visual main integration

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-character-visual-main.yml"
      - "tools/apply_character_visual_fix.py"

permissions:
  contents: write

jobs:
  integrate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply visual asset references
        run: python3 tools/apply_character_visual_fix.py

      - name: Validate integration
        run: |
          node --check game.js
          git diff --check
          grep -q 'assets/nabatick-idle-v2.svg' game.js
          grep -q 'assets/nabatick-eat-prepare-v2.svg' game.js
          grep -q 'assets/nabatick-eat-v2.svg' game.js
          grep -q 'assets/nabatick-idle-v2.svg' index.html
          grep -q 'character-selector.css?v=20260621-2' index.html
          grep -q 'game.js?v=20260621-11' index.html

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No integration changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js index.html
          git commit -m "fix: activate seamless Nabatick artwork"
          git pull --rebase origin main
          git push origin HEAD:main
