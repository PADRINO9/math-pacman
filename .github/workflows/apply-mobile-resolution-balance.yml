name: Apply full mobile maze fit

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply-mobile-resolution-balance.yml"
      - "tools/apply_mobile_resolution_balance.py"

permissions:
  contents: write

jobs:
  balance:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fit complete maze on mobile
        run: python tools/apply_mobile_resolution_balance.py

      - name: Validate game script
        run: |
          node --check game.js
          git diff --check

      - name: Commit full mobile fit
        run: |
          if git diff --quiet; then
            echo "No camera changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js
          git commit -m "fix: show the complete maze on mobile"
          git pull --rebase origin main
          git push origin HEAD:main
