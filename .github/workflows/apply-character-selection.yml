name: Apply and test character selection

on:
  push:
    branches:
      - character-selection-v1
    paths:
      - ".github/workflows/apply-character-selection.yml"
      - "tools/apply_character_selection.py"
      - "tools/character-assets/**"
      - "character-selector.css"
      - "tests/character-selection.mjs"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

env:
  NODE_VERSION: "20"

jobs:
  build-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: character-selection-v1
          fetch-depth: 0

      - name: Normalize Nabatick eating source
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("tools/character-assets/nabatick-eat.png.b64")
          text = path.read_text(encoding="utf-8")
          path.write_text(text.replace("AAfinniUZ", "AAinniUZ"), encoding="utf-8")
          PY

      - name: Decode idle sprite
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, struct
          source = Path("tools/character-assets/nabatick-idle.png.b64")
          data = base64.b64decode("".join(source.read_text().split()), validate=True)
          assert hashlib.sha256(data).hexdigest() == "eef95e15d7ea22dfe36e0c5363649a166c1ac453b1d1e8514a1330e088f15154"
          assert data[:8] == b"\x89PNG\r\n\x1a\n"
          assert struct.unpack(">II", data[16:24]) == (128, 128)
          Path("assets/nabatick-idle.png").write_bytes(data)
          print("idle sprite validated", len(data))
          PY

      - name: Decode prepare sprite
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, struct
          source = Path("tools/character-assets/nabatick-eat-prepare.png.b64")
          data = base64.b64decode("".join(source.read_text().split()), validate=True)
          assert hashlib.sha256(data).hexdigest() == "77c4c6f23bed5ea7cec512edf5b7855ff3541d95806e937fd95538692c56c317"
          assert data[:8] == b"\x89PNG\r\n\x1a\n"
          assert struct.unpack(">II", data[16:24]) == (128, 128)
          Path("assets/nabatick-eat-prepare.png").write_bytes(data)
          print("prepare sprite validated", len(data))
          PY

      - name: Decode eating sprite
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64, hashlib, struct
          source = Path("tools/character-assets/nabatick-eat.png.b64")
          encoded = "".join(source.read_text().split())
          print("eating base64 length", len(encoded))
          data = base64.b64decode(encoded, validate=True)
          digest = hashlib.sha256(data).hexdigest()
          print("eating sprite digest", digest, "bytes", len(data))
          assert digest == "c67b531aba32da462bd3d602d969240746c904c6d85c4bb28e9e849d6f22710d"
          assert data[:8] == b"\x89PNG\r\n\x1a\n"
          assert struct.unpack(">II", data[16:24]) == (128, 128)
          Path("assets/nabatick-eat.png").write_bytes(data)
          PY

      - name: Apply character-selection patch
        run: python3 tools/apply_character_selection.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate generated sources
        run: |
          node --check game.js
          git diff --check
          grep -q 'PLAYER_CHARACTERS' game.js
          grep -q 'name="character" value="bifly"' index.html
          grep -q 'name="character" value="nabatick"' index.html
          grep -q 'assets/nabatick-eat.png' game.js
          grep -q 'character-selector.css' index.html
          grep -q 'game.js?v=20260621-10' index.html

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.53.0
          npx playwright install --with-deps chromium

      - name: Run mobile browser test
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 > /tmp/math-maze-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID || true' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              break
            fi
            sleep 0.5
          done
          TEST_BASE_URL=http://127.0.0.1:4173 node tests/character-selection.mjs

      - name: Commit generated assets and integrated sources
        run: |
          if git diff --quiet; then
            echo "No generated changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tools/character-assets/nabatick-eat.png.b64 \
            assets/nabatick-idle.png \
            assets/nabatick-eat-prepare.png \
            assets/nabatick-eat.png \
            index.html \
            game.js
          git commit -m "feat: add selectable Nabatick character with animations"
          git pull --rebase origin character-selection-v1
          git push origin HEAD:character-selection-v1
