name: Fix mobile enemy chase lock

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-mobile-enemy-chase-lock.yml"
      - "tools/fix_mobile_enemy_chase_lock.py"

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply definitive chase fix
        run: python tools/fix_mobile_enemy_chase_lock.py

      - name: Validate source
        run: |
          node --check game.js
          git diff --check
          grep -q 'enemy center-lock' game.js
          grep -q 'if (MOBILE_RUNTIME.coarse)' game.js
          grep -q 'candidateMoves = MOBILE_RUNTIME.coarse' game.js
          grep -q 'game.js?v=20260621-9' index.html

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game.js index.html
          git commit -m "fix: restore direct mobile enemy pursuit"
          git pull --rebase origin main
          git push origin HEAD:main
