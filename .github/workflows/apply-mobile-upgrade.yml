name: Apply mobile upgrade

on:
  push:
    branches:
      - mobile-ui-v1
    paths:
      - ".github/workflows/apply-mobile-upgrade.yml"
      - "tools/apply_mobile_upgrade.py"
      - "mobile-enhancements.css"
      - "mobile-enhancements.js"
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out mobile branch
        uses: actions/checkout@v4
        with:
          ref: mobile-ui-v1
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply deterministic patch
        run: python tools/apply_mobile_upgrade.py

      - name: Check patch formatting
        run: git diff --check

      - name: Commit upgraded sources
        run: |
          if git diff --quiet; then
            echo "No source changes were required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html styles.css game.js
          git commit -m "feat: deliver responsive mobile and tablet experience"
          git push origin HEAD:mobile-ui-v1

      - name: Validate upgraded JavaScript
        run: |
          node --check game.js
          node --check mobile-enhancements.js
          grep -q 'mobile-enhancements.css' index.html
          grep -q 'dataset.gameViewport' game.js
