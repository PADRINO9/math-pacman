<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>מבוך החשבון</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230f776f'/%3E%3Cpath d='M16 29h13V16h6v13h13v6H35v13h-6V35H16z' fill='%23ecfffc'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@500;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260619-1">
</head>
<body>
  <main class="game-shell" aria-label="מבוך החשבון">
    <div class="hud" aria-live="polite">
      <div class="hud-group hud-group-main">
        <div class="metric">
          <span class="metric-label">תשובות</span>
          <strong><span id="correct-answers">0</span><span id="target-correct" class="metric-muted">/100</span></strong>
        </div>
        <div class="metric">
          <span class="metric-label">שלב</span>
          <strong id="level-number">1</strong>
        </div>
        <div class="metric metric-world">
          <span class="metric-label">עולם</span>
          <strong id="world-name">קרח</strong>
        </div>
        <div class="metric">
          <span class="metric-label">ניקוד</span>
          <strong id="score">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">רצף</span>
          <strong id="combo">0</strong>
        </div>
        <div class="metric metric-lives">
          <span class="metric-label">חיים</span>
          <strong id="lives" aria-label="3 חיים">♥♥♥</strong>
        </div>
        <div id="mission-card" class="metric metric-mission">
          <span class="metric-label">משימה</span>
          <strong id="mission-title">ענה נכון על 10 שאלות</strong>
          <span id="mission-progress" class="mission-progress">0/10</span>
        </div>
      </div>

      <div class="progress-wrap" aria-label="התקדמות עד ניצחון">
        <div id="progress-fill"></div>
      </div>

      <div class="hud-group hud-actions">
        <button id="pause-button" class="icon-button" type="button" aria-label="השהיה">Ⅱ</button>
        <button id="sound-button" class="icon-button" type="button" aria-label="צלילים">♪</button>
      </div>
    </div>

    <section class="stage" aria-label="לוח המשחק" tabindex="-1">
      <canvas id="game-canvas" width="960" height="720"></canvas>

      <div id="question-dialog" class="dialog" role="dialog" aria-modal="true" aria-labelledby="question-title" hidden>
        <div class="dialog-inner">
          <span id="question-status" class="dialog-kicker">יריב נתפס</span>
          <div id="question-timer" class="question-timer" hidden>
            <span>זמן</span>
            <strong id="question-time">25</strong>
          </div>
          <h1 id="question-title" dir="ltr">8 × 7 = ?</h1>
          <form id="answer-form" autocomplete="off">
            <input id="answer-input" type="text" inputmode="numeric" pattern="[0-9]*" enterkeyhint="done" aria-label="תשובה" required>
            <button id="submit-answer" type="submit">שלח</button>
          </form>
          <p id="question-feedback" aria-live="assertive"></p>
        </div>
      </div>

      <div id="start-screen" class="screen screen-visible">
        <div class="screen-panel">
          <p class="eyebrow">מבוך החשבון</p>
          <div class="start-graphic" aria-hidden="true">
            <span class="start-graphic-player"></span>
            <span class="start-graphic-collectible"></span>
            <span class="start-graphic-collectible"></span>
            <span class="start-graphic-collectible"></span>
            <span class="start-graphic-enemy start-graphic-enemy-a"></span>
            <span class="start-graphic-enemy start-graphic-enemy-b"></span>
          </div>
          <h1>אתגרי הכפל מחכים</h1>
          <div class="screen-stats">
            <span>שיא: <strong id="best-score">0</strong></span>
            <span>יעד: <strong>100</strong></span>
          </div>
          <form id="player-form" class="name-form" autocomplete="off" novalidate>
            <label for="player-name-input">שם השחקן</label>
            <input id="player-name-input" type="text" maxlength="18" required>
            <p id="name-error" class="form-note" aria-live="assertive"></p>
            <fieldset class="difficulty-field">
              <legend>רמת קושי</legend>
              <div class="difficulty-options" role="radiogroup" aria-label="רמת קושי">
                <label>
                  <input type="radio" name="difficulty" value="easy">
                  <span>קל</span>
                </label>
                <label>
                  <input type="radio" name="difficulty" value="medium" checked>
                  <span>בינוני</span>
                </label>
                <label>
                  <input type="radio" name="difficulty" value="hard">
                  <span>קשה</span>
                </label>
                <label>
                  <input type="radio" name="difficulty" value="veryHard">
                  <span>קשה מאוד</span>
                </label>
              </div>
            </fieldset>
            <div class="time-limit-setting">
              <span class="time-limit-title">זמן לכל תרגיל</span>
              <button id="time-limit-toggle" class="time-limit-toggle" type="button" aria-pressed="false" aria-label="הפעל הגבלת זמן של 25 שניות לכל תרגיל">
                <span class="clock-icon" aria-hidden="true"></span>
              </button>
              <span id="time-limit-state" class="time-limit-state">ללא זמן</span>
            </div>
            <button id="start-button" class="primary-button" type="submit">התחל משחק</button>
          </form>
        </div>
      </div>

      <div id="end-screen" class="screen" hidden>
        <div class="screen-panel">
          <div id="winner-trophy" class="winner-trophy" aria-hidden="true" hidden>🏆</div>
          <p id="end-kicker" class="eyebrow">כל הכבוד</p>
          <h1 id="end-title">ניצחון!</h1>
          <p id="end-copy"></p>
          <div class="screen-stats">
            <span>ניקוד: <strong id="final-score">0</strong></span>
            <span>תשובות: <strong id="final-correct">0</strong></span>
          </div>
          <button id="restart-button" class="primary-button" type="button">שחק שוב</button>
        </div>
      </div>

    </section>

    <div class="mobile-joystick" aria-label="בקרי תנועה">
      <div id="movement-joystick" class="joystick-base" role="application" aria-label="ג׳ויסטיק תנועה">
        <div class="joystick-knob" aria-hidden="true"></div>
      </div>
    </div>
  </main>

  <script src="game.js?v=20260619-1"></script>
</body>
</html>
